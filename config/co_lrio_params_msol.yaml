  co_lrio_lidar_odometry:
    ros__parameters:
      # IMU Settings
      sensor: livox
      n_scan: 6
      horizon_scan: 1800
      imu_topic: "livox/imu"
      scan_topic: "livox/points" 
      imu_acc_noise: 5.886e-04
      imu_gyr_noise: 1.7453e-04
      imu_acc_bias_noise: 1.4715e-05 
      imu_gyr_bias_noise: 1.6653e-06 
      imu_gravity: 9.80511

      # Extrinsics: T_lb (lidar -> imu)
      extrinsic_l2i: [ 0.9992619178, -0.0383842364, -0.0015066673, -0.2267518044,
                      0.0383766326,  0.9992518783, -0.0047872494,  0.3217161996,
                      0.0016892951,  0.0047258952,  0.9999874060, -0.0728942406,
